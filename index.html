<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Keeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="version">v0.4.0</div>

<!-- STATUS BAR -->
<div class="statusbar">

    <div>Day: <span id="day">1</span></div>
    <div>Year: <span id="year">1</span></div>
    <div>Season: <span id="season">Spring</span></div>

</div>

<!-- TOP BAR -->
<div class="topbar">

    <button class="tab active" onclick="showScreen('overview')">Overview</button>
    <button class="tab" onclick="showScreen('dungeon')">Dungeon</button>
    <button class="tab" onclick="showScreen('research')">Research</button>
    <button class="tab" onclick="showScreen('world')">World</button>

</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Resources</h2>

        <div id="foodLine">Food: <span id="food">0</span> / <span id="foodCap">100</span></div>
        <div id="woodLine">Wood: <span id="wood">0</span> / <span id="woodCap">100</span></div>
        <div id="stoneLine">Stone: <span id="stone">0</span> / <span id="stoneCap">100</span></div>

        <hr>

        <h3>Buildings</h3>

        <div>Nests: <span id="nestCount">0</span></div>
        <div>Farms: <span id="farmCount">0</span></div>
        <div>Lumber Camps: <span id="lumberCount">0</span></div>
        <div>Quarries: <span id="quarryCount">0</span></div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- OVERVIEW -->
        <div class="screen active" id="overview">

            <h1>Overview</h1>

            <button onclick="gatherFood()">Gather Food</button>
            <button onclick="gatherWood()">Gather Wood</button>
            <button onclick="gatherStone()">Gather Stone</button>

        </div>

        <!-- DUNGEON -->
        <div class="screen" id="dungeon">

            <h1>Dungeon</h1>

            <h2>Production Buildings</h2>

            <button onclick="buildFarm()">Build Farm (10 Wood)</button>
            <button onclick="buildLumber()">Build Lumber Camp (10 Wood)</button>
            <button onclick="buildQuarry()">Build Quarry (10 Wood)</button>

            <hr>

            <h2>Utility</h2>

            <button onclick="buildNest()">Build Nest (10W / 5S)</button>
            <button onclick="buildStorage()">Build Storage (20 Wood)</button>

        </div>

        <div class="screen" id="research"><h1>Research</h1></div>
        <div class="screen" id="world"><h1>World</h1></div>

    </div>

</div>

<script src="save.js"></script>
<script src="game.js"></script>

</body>
</html>
