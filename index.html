<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Keeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- VERSION -->
<div class="version">v0.3.1</div>

<!-- STATUS BAR -->
<div class="statusbar">

    <div class="status-item">
        Day: <span id="day">1</span>
    </div>

    <div class="status-item">
        Year: <span id="year">1</span>
    </div>

    <div class="status-item">
        Season: <span id="season">Spring</span>
    </div>

</div>

<!-- TOP NAV -->
<div class="topbar">

    <button class="tab active" onclick="showScreen('overview')">Overview</button>
    <button class="tab" onclick="showScreen('dungeon')">Dungeon</button>
    <button class="tab" onclick="showScreen('research')">Research</button>
    <button class="tab" onclick="showScreen('world')">World</button>

</div>

<!-- MAIN LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Resources</h2>

        <div>Food: <span id="food">0</span></div>
        <div>Wood: <span id="wood">0</span></div>
        <div>Stone: <span id="stone">0</span></div>

        <hr>

        <h3>Dungeon</h3>
        <div>Nests: <span id="nestCount">0</span></div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- OVERVIEW -->
        <div class="screen active" id="overview">

            <h1>Overview</h1>

            <p>Your dungeon grows in the dark below the world.</p>

            <button onclick="gatherFood()">Gather Food</button>
            <button onclick="gatherWood()">Gather Wood</button>
            <button onclick="gatherStone()">Gather Stone</button>

        </div>

        <!-- DUNGEON -->
        <div class="screen" id="dungeon">

            <h1>Dungeon</h1>

            <p>Construct rooms to expand your dungeon core.</p>

            <button onclick="buildNest()">Build Nest (10 Wood / 5 Stone)</button>

        </div>

        <!-- RESEARCH -->
        <div class="screen" id="research">

            <h1>Research</h1>
            <p>Coming soon...</p>

        </div>

        <!-- WORLD -->
        <div class="screen" id="world">

            <h1>World</h1>
            <p>Coming soon...</p>

        </div>

    </div>

</div>

<script src="save.js"></script>
<script src="game.js"></script>

</body>
</html>
