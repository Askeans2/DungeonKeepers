<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Keeper</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="version">v0.10</div>

<div class="statusbar">
    <div class="status-center">
        <div>Day: <span id="day">1</span></div>
        <div>Year: <span id="year">1</span></div>
        <div>Season: <span id="season">Spring</span></div>
    </div>
</div>

<div class="layout">

    <!-- LEFT -->
    <div class="panel left">
        <h2>Resources</h2>

        <div>Food: <span id="food">0</span> / <span id="foodCap">100</span></div>
        <div>Wood: <span id="wood">0</span> / <span id="woodCap">100</span></div>
        <div>Stone: <span id="stone">0</span> / <span id="stoneCap">100</span></div>
    </div>

    <!-- CENTER -->
    <div class="panel center">

        <h2>Outskirts</h2>

        <div class="grid">

            <button class="build-btn" onclick="build('farm')" id="btn-farm">
                <div class="btn-title">Farm</div>
                <div class="btn-count" id="farmCount">0</div>
                <div class="btn-cost">10 Wood</div>
            </button>

            <button class="build-btn" onclick="build('lumber')" id="btn-lumber">
                <div class="btn-title">Lumber Camp</div>
                <div class="btn-count" id="lumberCount">0</div>
                <div class="btn-cost">10 Wood</div>
            </button>

            <button class="build-btn" onclick="build('quarry')" id="btn-quarry">
                <div class="btn-title">Quarry</div>
                <div class="btn-count" id="quarryCount">0</div>
                <div class="btn-cost">10 Wood</div>
            </button>

            <button class="build-btn" onclick="build('storage')" id="btn-storage">
                <div class="btn-title">Storage</div>
                <div class="btn-count" id="storageCount">0</div>
                <div class="btn-cost">20 Wood</div>
            </button>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="panel right">
        <h2>Context</h2>
        <p>System panel</p>
    </div>

</div>

<script src="save.js"></script>
<script src="game.js"></script>

</body>
</html>
