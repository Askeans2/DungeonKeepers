<!DOCTYPE html>
<html>
<head>
    <title>Dungeon Keeper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="version">v0.08</div>

<!-- TOP BAR (CENTERED TIME) -->
<div class="statusbar">

    <div class="status-left"></div>

    <div class="status-center">

        <div>Day: <span id="day">1</span></div>
        <div>Year: <span id="year">1</span></div>
        <div>Season: <span id="season">Spring</span></div>

    </div>

    <div class="status-right"></div>

</div>

<div class="layout">

    <!-- LEFT: RESOURCES ONLY -->
    <div class="panel left">

        <h2>Resources</h2>

        <div id="foodLine">Food: <span id="food">0</span> / <span id="foodCap">100</span></div>
        <div id="woodLine">Wood: <span id="wood">0</span> / <span id="woodCap">100</span></div>
        <div id="stoneLine">Stone: <span id="stone">0</span> / <span id="stoneCap">100</span></div>

    </div>

    <!-- CENTER: ACTIONS -->
    <div class="panel center">

        <h2>Actions</h2>

        <button onclick="gatherFood()">Gather Food</button>
        <button onclick="gatherWood()">Gather Wood</button>
        <button onclick="gatherStone()">Gather Stone</button>

        <hr>

        <h3>Production</h3>

        <button class="build-btn" onclick="buildFarm()">
            Build Farm
            <span class="count" id="farmCount">0</span>
        </button>

        <button class="build-btn" onclick="buildLumber()">
            Build Lumber Camp
            <span class="count" id="lumberCount">0</span>
        </button>

        <button class="build-btn" onclick="buildQuarry()">
            Build Quarry
            <span class="count" id="quarryCount">0</span>
        </button>

        <hr>

        <h3>Utility</h3>

        <button class="build-btn" onclick="buildNest()">
            Build Nest
            <span class="count" id="nestCount">0</span>
        </button>

        <button class="build-btn" onclick="buildStorage()">
            Storage Upgrade
            <span class="count" id="storageCount">0</span>
        </button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right">

        <h2>Context</h2>
        <p>Future system panel</p>

    </div>

</div>

<script src="save.js"></script>
<script src="game.js"></script>

</body>
</html>
